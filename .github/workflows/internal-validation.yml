name: Internal Validation

on:
  workflow_dispatch:
    inputs:
      gradle_args:
        description: 'Extra Gradle args'
        required: false
        default: '--stacktrace --info'
        type: string
  pull_request:
    branches:
      - main
      - develop

env:
  GITHUB_CLIENT_ID_DEV: ${{ vars.GITHUB_CLIENT_ID_DEV || 'local-dev-client-id' }}
  GITHUB_CLIENT_ID_PRODUCTION: ${{ vars.GITHUB_CLIENT_ID_PRODUCTION || 'local-production-client-id' }}
  ALLOW_UNSIGNED_RELEASE: "true"

jobs:
  unsigned-validation:
    name: Unsigned Production Validation Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - name: Generate local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build production release (unsigned validation)
        run: ./gradlew assembleProductionRelease ${{ inputs.gradle_args || '--stacktrace --info' }}
      - name: Upload unsigned validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: internal-validation-unsigned-apk
          path: app/build/outputs/apk/production/release/*.apk
