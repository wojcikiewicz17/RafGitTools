name: Android CI

on:
  workflow_call:
    inputs:
      build_mode:
        description: "Stages to run"
        required: false
        default: all
        type: string
      run_release_variant:
        description: "Include release variants"
        required: false
        default: true
        type: boolean
      gradle_args:
        description: "Additional Gradle args"
        required: false
        default: "--stacktrace"
        type: string
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Stages to run"
        required: true
        default: all
        type: choice
        options: [all, build_only, tests_only, lint_only]
      run_release_variant:
        description: "Include release variants"
        required: false
        default: true
        type: boolean
      gradle_args:
        description: "Additional Gradle args"
        required: false
        default: "--stacktrace"
        type: string

env:
  GITHUB_CLIENT_ID_DEV: ${{ vars.GITHUB_CLIENT_ID_DEV || 'local-dev-client-id' }}
  GITHUB_CLIENT_ID_PRODUCTION: ${{ vars.GITHUB_CLIENT_ID_PRODUCTION || 'local-production-client-id' }}
  ALLOW_UNSIGNED_RELEASE: "true"

jobs:
  build:
    name: Build Variants
    if: inputs.build_mode == 'all' || inputs.build_mode == 'build_only'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        variant: [devDebug, productionDebug, devRelease, productionRelease]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Prepare local.properties
        run: |
          sdk_path="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$sdk_path" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set" >&2
            exit 1
          fi
          printf 'sdk.dir=%s\n' "$sdk_path" > local.properties
      - run: chmod +x gradlew
      - name: Assemble ${{ matrix.variant }}
        if: inputs.run_release_variant || !contains(matrix.variant, 'Release')
        run: ./gradlew assemble${{ matrix.variant }} ${{ inputs.gradle_args }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apks-${{ matrix.variant }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 14

  test:
    name: Unit Tests
    if: inputs.build_mode == 'all' || inputs.build_mode == 'tests_only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Prepare local.properties
        run: |
          sdk_path="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$sdk_path" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set" >&2
            exit 1
          fi
          printf 'sdk.dir=%s\n' "$sdk_path" > local.properties
      - run: chmod +x gradlew
      - name: Run Unit Tests
        run: ./gradlew testDevDebugUnitTest testProductionDebugUnitTest ${{ inputs.gradle_args }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            app/build/test-results/
            app/build/reports/tests/

  lint:
    name: Lint
    if: inputs.build_mode == 'all' || inputs.build_mode == 'lint_only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Prepare local.properties
        run: |
          sdk_path="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$sdk_path" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set" >&2
            exit 1
          fi
          printf 'sdk.dir=%s\n' "$sdk_path" > local.properties
      - run: chmod +x gradlew
      - name: Run Lint
        run: ./gradlew lintDevDebug lintProductionDebug ${{ inputs.gradle_args }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results*.html
            app/build/reports/lint-results*.xml
            app/build/reports/lint-results*.txt

  summary:
    name: CI Summary
    if: always()
    runs-on: ubuntu-latest
    needs: [build, test, lint]
    steps:
      - name: Explain configuration and variables
        run: |
          echo "## Android CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- build_mode: ${{ inputs.build_mode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- run_release_variant: ${{ inputs.run_release_variant }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- gradle_args: ${{ inputs.gradle_args }}" >> "$GITHUB_STEP_SUMMARY"
