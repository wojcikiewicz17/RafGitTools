name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Wizard: choose which build stages to run"
        required: true
        default: all
        type: choice
        options: [all, build_only, tests_only, lint_only]
      run_release_variant:
        description: "Include release variants even without signing"
        required: false
        default: true
        type: boolean
      gradle_args:
        description: "Extra Gradle args (example: --stacktrace --info)"
        required: false
        default: "--stacktrace"
        type: string

jobs:
  android-ci:
    name: Android CI Pipeline
    uses: ./.github/workflows/android-ci.yml
    with:
      build_mode: ${{ inputs.build_mode || 'all' }}
      run_release_variant: ${{ inputs.run_release_variant != false }}
      gradle_args: ${{ inputs.gradle_args || '--stacktrace' }}
